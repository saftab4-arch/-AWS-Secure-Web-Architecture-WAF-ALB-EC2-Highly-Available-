<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1150" viewBox="0 0 1800 1150">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#232F3E"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#FF9900"/>
    </marker>
    <style>
      .title{font-family:Arial,Helvetica,sans-serif;font-weight:700;fill:#111827}
      .text{font-family:Arial,Helvetica,sans-serif;fill:#111827}
      .small{font-family:Arial,Helvetica,sans-serif;font-size:20px;fill:#374151}
      .tiny{font-family:Arial,Helvetica,sans-serif;font-size:17px;fill:#4B5563}
      .label{font-family:Arial,Helvetica,sans-serif;font-size:24px;font-weight:700;fill:#111827}
      .white{fill:#fff}
      .awsOrange{fill:#FF9900}
      .awsDark{fill:#232F3E}
      .box{fill:#fff;stroke:#D1D5DB;stroke-width:3;rx:18;filter:url(#shadow)}
      .service{fill:#fff;stroke:#FF9900;stroke-width:3;rx:16;filter:url(#shadow)}
      .subnet{fill:#EFF6FF;stroke:#3B82F6;stroke-width:3;rx:18}
      .vpc{fill:#F8FAFC;stroke:#1F2937;stroke-width:4;rx:24}
      .az{fill:#E0F2FE;stroke:#0284C7;stroke-width:2;stroke-dasharray:8 8;rx:18}
      .note{fill:#FFF7ED;stroke:#FB923C;stroke-width:2;rx:14}
      .secure{fill:#ECFDF5;stroke:#10B981;stroke-width:2;rx:14}
      .danger{fill:#FEF2F2;stroke:#EF4444;stroke-width:2;rx:14}
      .arrow{stroke:#232F3E;stroke-width:4;fill:none;marker-end:url(#arrow)}
      .arrowO{stroke:#FF9900;stroke-width:5;fill:none;marker-end:url(#arrowOrange)}
      .dash{stroke:#6B7280;stroke-width:3;fill:none;stroke-dasharray:8 8;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1800" height="1150" fill="#F3F4F6"/>
  <text x="60" y="72" class="title" font-size="42">AWS Secure Web Architecture: WAF + ALB + EC2</text>
  <text x="60" y="110" class="small">Highly available web app with WAF inspection, ALB routing, target group health checks, and locked-down EC2 backend access</text>

  <!-- Header flow -->
  <g transform="translate(70,155)">
    <rect class="box" width="1660" height="120"/>
    <text x="35" y="45" class="label">Request Flow</text>
    <text x="35" y="82" class="small">Client → AWS WAF → Internet-facing ALB → Target Group → Healthy EC2 web server</text>
    <text x="1010" y="45" class="label">Security Principle</text>
    <text x="1010" y="82" class="small">Direct EC2 HTTP access is blocked. Only ALB SG can reach EC2 on port 80.</text>
  </g>

  <!-- Internet / WAF -->
  <g transform="translate(115,340)">
    <circle cx="90" cy="80" r="58" fill="#DBEAFE" stroke="#2563EB" stroke-width="3" filter="url(#shadow)"/>
    <text x="59" y="93" font-size="54">🌐</text>
    <text x="22" y="165" class="label">Internet Users</text>
    <text x="20" y="195" class="tiny">HTTP requests</text>
  </g>
  <path class="arrowO" d="M310 420 C390 420 430 420 505 420"/>

  <g transform="translate(510,335)">
    <rect class="service" width="250" height="165"/>
    <rect x="22" y="22" width="64" height="64" rx="12" fill="#FF9900"/>
    <text x="38" y="68" font-size="38">🛡️</text>
    <text x="105" y="45" class="label">AWS WAF</text>
    <text x="105" y="78" class="tiny">Web ACL / Protection Pack</text>
    <text x="28" y="115" class="tiny">Rules: Core Rule Set</text>
    <text x="28" y="140" class="tiny">Known Bad Inputs, IP Reputation</text>
  </g>

  <!-- VPC -->
  <g transform="translate(810,315)">
    <rect class="vpc" width="900" height="705"/>
    <text x="28" y="44" class="label">VPC: waf-alb-ec2-vpc</text>
    <text x="28" y="75" class="small">CIDR: 10.0.0.0/16 | Region: us-east-1</text>

    <!-- IGW -->
    <g transform="translate(65,105)">
      <rect class="service" width="190" height="94"/>
      <text x="22" y="43" font-size="32">🚪</text>
      <text x="65" y="38" class="label" font-size="22">Internet</text>
      <text x="65" y="66" class="label" font-size="22">Gateway</text>
      <text x="25" y="88" class="tiny">waf-alb-ec2-igw</text>
    </g>

    <!-- ALB -->
    <g transform="translate(340,92)">
      <rect class="service" width="315" height="130"/>
      <rect x="22" y="25" width="62" height="62" rx="12" fill="#FF9900"/>
      <text x="36" y="67" font-size="34">⚖️</text>
      <text x="105" y="42" class="label">Application Load Balancer</text>
      <text x="105" y="73" class="tiny">waf-project-alb</text>
      <text x="24" y="105" class="tiny">Listener: HTTP :80</text>
      <text x="155" y="105" class="tiny">DNS: waf-project-alb-895367097.us-east-1.elb.amazonaws.com</text>
    </g>

    <!-- Target Group -->
    <g transform="translate(385,265)">
      <rect class="service" width="250" height="115"/>
      <text x="25" y="45" font-size="34">🎯</text>
      <text x="75" y="45" class="label">Target Group</text>
      <text x="75" y="75" class="tiny">waf-project-tg</text>
      <text x="25" y="100" class="tiny">Port 80 | Health check: /</text>
    </g>

    <!-- AZ Boxes -->
    <g transform="translate(55,425)">
      <rect class="az" width="375" height="235"/>
      <text x="22" y="38" class="label" font-size="22">Availability Zone: us-east-1a</text>
      <g transform="translate(25,62)">
        <rect class="subnet" width="325" height="150"/>
        <text x="20" y="35" class="label" font-size="22">Public Subnet 1</text>
        <text x="20" y="63" class="tiny">CIDR: 10.0.1.0/24</text>
        <rect x="195" y="72" width="100" height="58" rx="12" fill="#FF9900" stroke="#C2410C" stroke-width="2"/>
        <text x="225" y="112" font-size="32">🖥️</text>
        <text x="20" y="100" class="tiny">EC2: web-server-1</text>
        <text x="20" y="126" class="tiny">Private IP: 10.0.1.x</text>
      </g>
    </g>

    <g transform="translate(470,425)">
      <rect class="az" width="375" height="235"/>
      <text x="22" y="38" class="label" font-size="22">Availability Zone: us-east-1b</text>
      <g transform="translate(25,62)">
        <rect class="subnet" width="325" height="150"/>
        <text x="20" y="35" class="label" font-size="22">Public Subnet 2</text>
        <text x="20" y="63" class="tiny">CIDR: 10.0.2.0/24</text>
        <rect x="195" y="72" width="100" height="58" rx="12" fill="#FF9900" stroke="#C2410C" stroke-width="2"/>
        <text x="225" y="112" font-size="32">🖥️</text>
        <text x="20" y="100" class="tiny">EC2: web-server-2</text>
        <text x="20" y="126" class="tiny">Private IP: 10.0.2.x</text>
      </g>
    </g>

    <!-- Route table -->
    <g transform="translate(62,670)">
      <rect class="box" width="355" height="70"/>
      <text x="20" y="30" class="label" font-size="21">Public Route Table</text>
      <text x="20" y="57" class="tiny">0.0.0.0/0 → Internet Gateway</text>
    </g>

    <!-- Security group notes -->
    <g transform="translate(455,670)">
      <rect class="secure" width="390" height="92"/>
      <text x="18" y="30" class="label" font-size="21">Security Groups</text>
      <text x="18" y="57" class="tiny">ALB SG: HTTP 80 from 0.0.0.0/0</text>
      <text x="18" y="80" class="tiny">EC2 SG: HTTP 80 from ALB SG only</text>
    </g>

    <!-- Internal arrows -->
    <path class="arrow" d="M255 152 L338 152"/>
    <path class="arrow" d="M498 222 L500 262"/>
    <path class="arrow" d="M452 380 C360 410 315 455 285 520"/>
    <path class="arrow" d="M570 380 C670 410 710 455 715 520"/>
  </g>

  <!-- Outside arrow WAF -> IGW/ALB -->
  <path class="arrowO" d="M760 420 C815 420 830 465 875 465"/>

  <!-- Security validation notes -->
  <g transform="translate(70,825)">
    <rect class="secure" width="690" height="195"/>
    <text x="25" y="42" class="label">Validation Performed</text>
    <text x="25" y="78" class="small">✅ Normal traffic reached ALB and routed to EC2 web servers</text>
    <text x="25" y="112" class="small">✅ XSS test returned 403 Forbidden from AWS WAF</text>
    <text x="25" y="146" class="small">✅ IP block rule returned 403 Forbidden</text>
    <text x="25" y="180" class="small">✅ Stopped one EC2; ALB routed traffic to the healthy server</text>
  </g>

  <g transform="translate(70,555)">
    <rect class="danger" width="690" height="185"/>
    <text x="25" y="42" class="label">Blocked Direct Access</text>
    <text x="25" y="78" class="small">Internet → EC2 Public IP = BLOCKED</text>
    <text x="25" y="112" class="small">Only this path is allowed:</text>
    <text x="25" y="146" class="small">Internet → WAF → ALB → Target Group → EC2</text>
  </g>

  <text x="60" y="1095" class="tiny">Note: EC2 private IPs are shown as subnet placeholders (10.0.1.x / 10.0.2.x) because exact instance private IPs were not captured before cleanup.</text>
</svg>
